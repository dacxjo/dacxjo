<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Machine Learning and Computer Vision animated header">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070f"/>
      <stop offset="50%" stop-color="#0a1228"/>
      <stop offset="100%" stop-color="#0f1535"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Title gradient that cycles -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffd5">
        <animate attributeName="stop-color"
          values="#00ffd5;#7df9ff;#a78bfa;#00ffd5"
          dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#7df9ff">
        <animate attributeName="stop-color"
          values="#7df9ff;#a78bfa;#00ffd5;#7df9ff"
          dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Scanline gradient -->
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ffd5" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ffd5" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00ffd5" stop-opacity="0"/>
    </linearGradient>

    <!-- Convolution kernel cell gradient -->
    <linearGradient id="cellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffd5" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Feature map pattern -->
    <pattern id="featureMap" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#0a1228"/>
      <rect width="20" height="20" fill="#00ffd5" opacity="0.05"/>
    </pattern>

    <!-- Pixel grid for feature maps -->
    <pattern id="pixelGrid" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="none" stroke="#00ffd5" stroke-width="0.3" stroke-opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>

  <!-- Grid overlay -->
  <g stroke="#00ffd5" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- LEFT SIDE: Convolutional feature maps (stacked) -->
  <g opacity="0.9">
    <!-- Stack of feature maps with perspective -->
    <g transform="translate(40, 130)">
      <!-- Map 3 (back) -->
      <rect x="40" y="-20" width="100" height="100" fill="#0a1228" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
      <rect x="40" y="-20" width="100" height="100" fill="url(#pixelGrid)" opacity="0.5"/>

      <!-- Map 2 (middle) -->
      <rect x="20" y="0" width="100" height="100" fill="#0a1228" stroke="#7df9ff" stroke-width="1" opacity="0.6"/>
      <rect x="20" y="0" width="100" height="100" fill="url(#pixelGrid)" opacity="0.7"/>

      <!-- Activations on middle map -->
      <rect x="36" y="16" width="8" height="8" fill="#7df9ff" opacity="0.7">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
      </rect>
      <rect x="60" y="32" width="8" height="8" fill="#7df9ff" opacity="0.5">
        <animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="84" y="48" width="8" height="8" fill="#7df9ff" opacity="0.6">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
      </rect>
      <rect x="52" y="72" width="8" height="8" fill="#7df9ff" opacity="0.5">
        <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.3s" repeatCount="indefinite"/>
      </rect>

      <!-- Map 1 (front) -->
      <rect x="0" y="20" width="100" height="100" fill="#0a1228" stroke="#00ffd5" stroke-width="1.5"/>
      <rect x="0" y="20" width="100" height="100" fill="url(#pixelGrid)" opacity="0.8"/>

      <!-- Active pixels on front map -->
      <rect x="16" y="36" width="8" height="8" fill="#00ffd5">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite"/>
      </rect>
      <rect x="40" y="44" width="8" height="8" fill="#00ffd5">
        <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.2s" repeatCount="indefinite"/>
      </rect>
      <rect x="64" y="60" width="8" height="8" fill="#00ffd5">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
      </rect>
      <rect x="32" y="76" width="8" height="8" fill="#00ffd5">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="80" y="92" width="8" height="8" fill="#00ffd5">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.7s" repeatCount="indefinite"/>
      </rect>

      <!-- Conv kernel 3x3 highlight (sliding) -->
      <rect x="0" y="20" width="24" height="24" fill="none" stroke="#ffeb3b" stroke-width="2" opacity="0.9">
        <animate attributeName="x" values="0;76;0" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="y" values="20;96;20" dur="6s" repeatCount="indefinite"/>
      </rect>

      <!-- Label -->
      <text x="50" y="145" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#7df9ff" opacity="0.7">conv2d · 64ch</text>
    </g>
  </g>

  <!-- RIGHT SIDE: Object detection bounding boxes on "image" -->
  <g transform="translate(960, 100)">
    <!-- Image frame -->
    <rect x="0" y="0" width="200" height="200" fill="#0a1228" stroke="#7df9ff" stroke-width="1" opacity="0.8"/>

    <!-- Simulated image content (abstract shapes representing detected objects) -->
    <circle cx="60" cy="70" r="22" fill="#a78bfa" opacity="0.25"/>
    <circle cx="60" cy="70" r="22" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.4"/>
    <rect x="110" y="110" width="60" height="55" fill="#7df9ff" opacity="0.2"/>
    <rect x="110" y="110" width="60" height="55" fill="none" stroke="#7df9ff" stroke-width="0.5" opacity="0.4"/>
    <ellipse cx="140" cy="50" rx="25" ry="18" fill="#f472b6" opacity="0.2"/>

    <!-- Bounding box 1: Person -->
    <g>
      <rect x="35" y="40" width="50" height="60" fill="none" stroke="#00ffd5" stroke-width="2">
        <animate attributeName="stroke-dashoffset" values="0;-20" dur="1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.5s" fill="freeze"/>
      </rect>
      <!-- Corner markers -->
      <path d="M 35 47 L 35 40 L 42 40" fill="none" stroke="#00ffd5" stroke-width="2.5" opacity="0.9"/>
      <path d="M 78 40 L 85 40 L 85 47" fill="none" stroke="#00ffd5" stroke-width="2.5" opacity="0.9"/>
      <path d="M 85 93 L 85 100 L 78 100" fill="none" stroke="#00ffd5" stroke-width="2.5" opacity="0.9"/>
      <path d="M 42 100 L 35 100 L 35 93" fill="none" stroke="#00ffd5" stroke-width="2.5" opacity="0.9"/>
      <!-- Label -->
      <rect x="35" y="26" width="58" height="12" fill="#00ffd5" opacity="0.9"/>
      <text x="38" y="35" font-family="'JetBrains Mono', monospace" font-size="8" fill="#05070f" font-weight="700">person 0.98</text>
    </g>

    <!-- Bounding box 2: Object -->
    <g>
      <rect x="100" y="95" width="80" height="78" fill="none" stroke="#f472b6" stroke-width="2"/>
      <path d="M 100 102 L 100 95 L 107 95" fill="none" stroke="#f472b6" stroke-width="2.5" opacity="0.9"/>
      <path d="M 173 95 L 180 95 L 180 102" fill="none" stroke="#f472b6" stroke-width="2.5" opacity="0.9"/>
      <path d="M 180 166 L 180 173 L 173 173" fill="none" stroke="#f472b6" stroke-width="2.5" opacity="0.9"/>
      <path d="M 107 173 L 100 173 L 100 166" fill="none" stroke="#f472b6" stroke-width="2.5" opacity="0.9"/>
      <rect x="100" y="81" width="50" height="12" fill="#f472b6" opacity="0.9"/>
      <text x="103" y="90" font-family="'JetBrains Mono', monospace" font-size="8" fill="#05070f" font-weight="700">car 0.87</text>
    </g>

    <!-- Bounding box 3 (smaller) -->
    <g>
      <rect x="120" y="35" width="50" height="35" fill="none" stroke="#a78bfa" stroke-width="2"/>
      <path d="M 120 42 L 120 35 L 127 35" fill="none" stroke="#a78bfa" stroke-width="2.5" opacity="0.9"/>
      <path d="M 163 35 L 170 35 L 170 42" fill="none" stroke="#a78bfa" stroke-width="2.5" opacity="0.9"/>
      <path d="M 170 63 L 170 70 L 163 70" fill="none" stroke="#a78bfa" stroke-width="2.5" opacity="0.9"/>
      <path d="M 127 70 L 120 70 L 120 63" fill="none" stroke="#a78bfa" stroke-width="2.5" opacity="0.9"/>
      <rect x="120" y="21" width="48" height="12" fill="#a78bfa" opacity="0.9"/>
      <text x="123" y="30" font-family="'JetBrains Mono', monospace" font-size="8" fill="#05070f" font-weight="700">dog 0.92</text>
    </g>

    <!-- Scanning line effect on the image -->
    <rect x="0" y="0" width="200" height="3" fill="url(#scanGrad)" opacity="0.9">
      <animate attributeName="y" values="0;197;0" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- Label below -->
    <text x="100" y="220" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#7df9ff" opacity="0.7">object detection</text>
  </g>

  <!-- Floating tech keywords -->
  <g font-family="'JetBrains Mono', monospace" font-size="11" fill="#7df9ff">
    <text x="60" y="40" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="5s" repeatCount="indefinite"/>
      &gt; CNN
    </text>
    <text x="60" y="350" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="6s" repeatCount="indefinite"/>
      &gt; ResNet
    </text>
    <text x="1100" y="40" opacity="0.4" text-anchor="end">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="5.5s" repeatCount="indefinite"/>
      YOLO &lt;
    </text>
    <text x="1100" y="380" opacity="0.4" text-anchor="end">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4.5s" repeatCount="indefinite"/>
      ViT &lt;
    </text>
  </g>

  <!-- Binary/data stream particles -->
  <g font-family="'JetBrains Mono', monospace" font-size="9" fill="#00ffd5" opacity="0.3">
    <text x="450" y="50">
      <animate attributeName="opacity" values="0;0.4;0" dur="6s" repeatCount="indefinite"/>
      10110101
    </text>
    <text x="700" y="370">
      <animate attributeName="opacity" values="0;0.4;0" dur="7s" repeatCount="indefinite"/>
      01001110
    </text>
    <text x="500" y="380">
      <animate attributeName="opacity" values="0;0.3;0" dur="8s" repeatCount="indefinite"/>
      11010010
    </text>
    <text x="800" y="50">
      <animate attributeName="opacity" values="0;0.4;0" dur="5.5s" repeatCount="indefinite"/>
      00111011
    </text>
  </g>

  <!-- Plexus particles -->
  <g>
    <circle cx="350" cy="50" r="1.5" fill="#00ffd5" opacity="0.6">
      <animate attributeName="cy" values="50;380;50" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="18s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="100" r="1" fill="#a78bfa" opacity="0.5">
      <animate attributeName="cy" values="100;400;100" dur="22s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="22s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="30" r="1.5" fill="#7df9ff" opacity="0.6">
      <animate attributeName="cy" values="30;390;30" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="380" r="1" fill="#00ffd5" opacity="0.5">
      <animate attributeName="cy" values="380;40;380" dur="25s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="25s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- CENTER: Main title -->
  <text x="600" y="195" text-anchor="middle"
        font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="68" font-weight="800"
        fill="url(#titleGrad)"
        filter="url(#textGlow)"
        letter-spacing="1">
    Hi, I'm David
  </text>

  <!-- Subtitle with terminal cursor -->
  <g>
    <text x="600" y="240" text-anchor="middle"
          font-family="'JetBrains Mono', 'Courier New', monospace"
          font-size="18" font-weight="500"
          fill="#cbd5e1"
          letter-spacing="2">
      &lt; ML · DL · SWE /&gt;
    </text>
  </g>

  <!-- Decorative brackets around title -->
  <g stroke="#00ffd5" stroke-width="2" fill="none" opacity="0.7">
    <!-- Left bracket -->
    <path d="M 260 165 L 250 165 L 250 225 L 260 225">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3s" repeatCount="indefinite"/>
    </path>
    <!-- Right bracket -->
    <path d="M 940 165 L 950 165 L 950 225 L 940 225">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Bottom status bar -->
  <g font-family="'JetBrains Mono', monospace" font-size="10" fill="#00ffd5" opacity="0.6">
    <circle cx="30" cy="380" r="3" fill="#00ffd5">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="42" y="384">model.eval()</text>
    <text x="1170" y="384" text-anchor="end">accuracy: 0.97</text>
  </g>
</svg>
