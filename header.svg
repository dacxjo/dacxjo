<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="David Blandon - ML and Software Engineer">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070f"/>
      <stop offset="50%" stop-color="#0a1228"/>
      <stop offset="100%" stop-color="#0f1535"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffd5">
        <animate attributeName="stop-color" values="#00ffd5;#7df9ff;#a78bfa;#00ffd5" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#7df9ff">
        <animate attributeName="stop-color" values="#7df9ff;#a78bfa;#00ffd5;#7df9ff" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Scan line gradient -->
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ffd5" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ffd5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00ffd5" stop-opacity="0"/>
    </linearGradient>

    <!-- Generic "image" gradient -->
    <radialGradient id="imgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#2a2a4a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0a1228" stop-opacity="0.3"/>
    </radialGradient>

    <!-- Attention heatmap -->
    <radialGradient id="heatmap1">
      <stop offset="0%" stop-color="#00ffd5" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#7df9ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>

    <!-- Patch grid -->
    <pattern id="patchGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="none" stroke="#a78bfa" stroke-width="0.4" stroke-opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g stroke="#00ffd5" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- LEFT SIDE: Computer Vision - ViT patch tokenization -->
  <g transform="translate(50, 110)">
    <!-- Image background -->
    <rect x="0" y="0" width="180" height="180" fill="#0a1228" stroke="#7df9ff" stroke-width="1" opacity="0.8"/>
    <rect x="0" y="0" width="180" height="180" fill="url(#imgGrad)"/>

    <!-- Abstract texture -->
    <g opacity="0.4" fill="none" stroke="#7d6a9a" stroke-width="0.6">
      <path d="M 20 60 Q 60 40, 100 70 T 170 80"/>
      <path d="M 10 100 Q 50 90, 90 110 T 175 105"/>
      <path d="M 15 140 Q 55 130, 95 145 T 170 150"/>
      <path d="M 30 30 Q 80 50, 130 35"/>
    </g>

    <!-- ViT patch grid overlay -->
    <rect x="0" y="0" width="180" height="180" fill="url(#patchGrid)" opacity="0.8"/>

    <!-- Highlighted patches -->
    <rect x="60" y="80" width="20" height="20" fill="#00ffd5" opacity="0.4">
      <animate attributeName="opacity" values="0;0.6;0" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="80" y="80" width="20" height="20" fill="#00ffd5" opacity="0.4">
      <animate attributeName="opacity" values="0;0.6;0" dur="3s" begin="0.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="100" y="80" width="20" height="20" fill="#00ffd5" opacity="0.4">
      <animate attributeName="opacity" values="0;0.6;0" dur="3s" begin="0.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="60" y="100" width="20" height="20" fill="#a78bfa" opacity="0.4">
      <animate attributeName="opacity" values="0;0.7;0" dur="3s" begin="0.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="80" y="100" width="20" height="20" fill="#a78bfa" opacity="0.5">
      <animate attributeName="opacity" values="0;0.8;0" dur="3s" begin="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="100" y="100" width="20" height="20" fill="#a78bfa" opacity="0.4">
      <animate attributeName="opacity" values="0;0.7;0" dur="3s" begin="1s" repeatCount="indefinite"/>
    </rect>

    <!-- Attention heatmap -->
    <ellipse cx="90" cy="100" rx="35" ry="28" fill="url(#heatmap1)" opacity="0.7">
      <animate attributeName="opacity" values="0.4;0.85;0.4" dur="3s" repeatCount="indefinite"/>
    </ellipse>

    <!-- ROI bounding box -->
    <rect x="55" y="70" width="75" height="65" fill="none" stroke="#00ffd5" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.9">
      <animate attributeName="stroke-dashoffset" values="0;-12" dur="1.5s" repeatCount="indefinite"/>
    </rect>

    <!-- Output label -->
    <rect x="0" y="-22" width="80" height="16" fill="#00ffd5" opacity="0.95"/>
    <text x="4" y="-10" font-family="'JetBrains Mono', monospace" font-size="9" fill="#05070f" font-weight="700">acc · 0.94</text>

    <!-- Scan line -->
    <rect x="0" y="0" width="180" height="3" fill="url(#scanGrad)" opacity="0.9">
      <animate attributeName="y" values="0;177;0" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- Labels below -->
    <text x="90" y="200" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#7df9ff" opacity="0.75">ViT · Swin · MaxViT</text>
    <text x="90" y="212" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#a78bfa" opacity="0.6">computer vision</text>
  </g>

  <!-- RIGHT SIDE: Software Engineering - terminal -->
  <g transform="translate(970, 110)">
    <!-- Terminal window -->
    <rect x="0" y="0" width="180" height="180" fill="#0a1228" stroke="#a78bfa" stroke-width="1" opacity="0.9" rx="4"/>

    <!-- Window header -->
    <rect x="0" y="0" width="180" height="18" fill="#1a1530" rx="4"/>
    <rect x="0" y="14" width="180" height="4" fill="#1a1530"/>
    <circle cx="10" cy="9" r="3" fill="#ff5f56"/>
    <circle cx="22" cy="9" r="3" fill="#ffbd2e"/>
    <circle cx="34" cy="9" r="3" fill="#27c93f"/>
    <text x="90" y="12" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="7" fill="#7df9ff" opacity="0.6">~/dev — zsh</text>

    <!-- Terminal content -->
    <g font-family="'JetBrains Mono', monospace" font-size="8">
      <text x="8" y="34" fill="#a78bfa" opacity="0.8">$ git status</text>
      <text x="8" y="46" fill="#7df9ff" opacity="0.6">On branch main</text>
      <text x="8" y="58" fill="#27c93f" opacity="0.8">  ✓ all changes committed</text>

      <text x="8" y="78" fill="#a78bfa" opacity="0.8">$ pytest</text>
      <text x="8" y="90" fill="#27c93f" opacity="0">
        ✓ 42 passed in 1.8s
        <animate attributeName="opacity" values="0;0.9" dur="0.3s" begin="1s" fill="freeze"/>
      </text>

      <text x="8" y="110" fill="#a78bfa" opacity="0.8">$ docker compose up</text>
      <text x="8" y="122" fill="#7df9ff" opacity="0">
        api    | running on :8000
        <animate attributeName="opacity" values="0;0.7" dur="0.3s" begin="2s" fill="freeze"/>
      </text>
      <text x="8" y="134" fill="#7df9ff" opacity="0">
        db     | accepting connections
        <animate attributeName="opacity" values="0;0.7" dur="0.3s" begin="2.4s" fill="freeze"/>
      </text>
      <text x="8" y="146" fill="#7df9ff" opacity="0">
        cache  | ready
        <animate attributeName="opacity" values="0;0.7" dur="0.3s" begin="2.8s" fill="freeze"/>
      </text>

      <text x="8" y="166" fill="#00ffd5" opacity="0">
        $ 
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.2s" fill="freeze"/>
      </text>

      <!-- Blinking cursor -->
      <rect x="16" y="160" width="5" height="8" fill="#00ffd5" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.5;0.51;0.99;1" dur="1s" begin="3.5s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- Labels below -->
    <text x="90" y="200" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#a78bfa" opacity="0.75">Python · TypeScript · Javascript</text>
    <text x="90" y="212" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#7df9ff" opacity="0.6">software engineering</text>
  </g>

  <!-- Tech keywords floating -->
  <g font-family="'JetBrains Mono', monospace" font-size="11" fill="#7df9ff">
    <text x="60" y="35" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="5s" repeatCount="indefinite"/>
      &gt; PyTorch
    </text>
    <text x="60" y="55" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="6s" repeatCount="indefinite"/> &gt; scikit-learn </text>
    <text x="60" y="355" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="5.5s" repeatCount="indefinite"/>
      &gt; TensorFlow
    </text>
    

    <text x="1140" y="35" opacity="0.4" text-anchor="end">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="5s" repeatCount="indefinite"/>
      FastAPI &lt;
    </text>
    <text x="1140" y="55" opacity="0.4" text-anchor="end">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="6s" repeatCount="indefinite"/>
      Docker &lt;
    </text>
    <text x="1140" y="355" opacity="0.4" text-anchor="end">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="5.5s" repeatCount="indefinite"/>
      PostgreSQL &lt;
    </text>
    <text x="1140" y="375" opacity="0.4" text-anchor="end">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4.5s" repeatCount="indefinite"/>
      AWS &lt;
    </text>
  </g>

  <!-- Background tensor notation -->
  <g font-family="'JetBrains Mono', monospace" font-size="9" fill="#00ffd5" opacity="0.3">
    <text x="450" y="50">
      <animate attributeName="opacity" values="0;0.4;0" dur="6s" repeatCount="indefinite"/>
      tensor[B, C, H, W]
    </text>
    <text x="700" y="360">
      <animate attributeName="opacity" values="0;0.4;0" dur="7s" repeatCount="indefinite"/>
      attn(Q, K, V)
    </text>
    <text x="500" y="370">
      <animate attributeName="opacity" values="0;0.3;0" dur="8s" repeatCount="indefinite"/>
      ∇loss → backward()
    </text>
    <text x="780" y="50">
      <animate attributeName="opacity" values="0;0.4;0" dur="5.5s" repeatCount="indefinite"/>
      softmax(logits)
    </text>
  </g>

  <!-- Plexus particles -->
  <g>
    <circle cx="350" cy="50" r="1.5" fill="#00ffd5" opacity="0.6">
      <animate attributeName="cy" values="50;380;50" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="18s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="100" r="1" fill="#a78bfa" opacity="0.5">
      <animate attributeName="cy" values="100;400;100" dur="22s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="22s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="30" r="1.5" fill="#7df9ff" opacity="0.6">
      <animate attributeName="cy" values="30;390;30" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="380" r="1" fill="#a78bfa" opacity="0.5">
      <animate attributeName="cy" values="380;30;380" dur="19s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="19s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- CENTER: Main title -->
  <text x="600" y="180" text-anchor="middle" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="64" font-weight="800" fill="url(#titleGrad)" filter="url(#textGlow)" letter-spacing="1">
    David Blandón
  </text>

  <!-- Subtitle -->
  <text x="600" y="218" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" font-weight="500" fill="#cbd5e1" letter-spacing="2"> &lt; ML &amp; SWE Engineer /&gt; </text>

  <!-- Rotating tagline -->
  <g font-family="'JetBrains Mono', monospace" font-size="13" fill="#00ffd5" text-anchor="middle">
    <text x="600" y="252" opacity="0">
      shipping deep-learning models to production
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.1;0.3;0.4;1" dur="12s" repeatCount="indefinite"/>
    </text>
    <text x="600" y="252" opacity="0">
      backend, frontend, and the ML in between
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.33;0.43;0.63;0.73;1" dur="12s" repeatCount="indefinite"/>
    </text>
    <text x="600" y="252" opacity="0">
      building scalable AI services
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.66;0.76;0.96;1" dur="12s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Decorative brackets framing title -->
  <g stroke="#00ffd5" stroke-width="2" fill="none" opacity="0.7">
    <path d="M 268 152 L 258 152 L 258 230 L 268 230">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M 932 152 L 942 152 L 942 230 L 932 230">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Bottom status bar -->
  <g font-family="'JetBrains Mono', monospace" font-size="10" fill="#00ffd5" opacity="0.65">
    <circle cx="60" cy="380" r="3" fill="#27c93f">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="70" y="384">Barcelona, ES </text>
    
  </g>
</svg>
